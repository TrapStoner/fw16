site_name: just some fw16 guides
site_url: https://trapstoner.github.io/fw16
site_author: TrapStoner
site_description: Framework 16 AMD Fedora Linux guides

repo_name: TrapStoner/fw16
repo_url: https://github.com/TrapStoner/fw16

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotation

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js
  - javascripts/highlight.js

extra_css:
  - stylesheets/extra.css
  - https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/tokyo-night-dark.min.css

# To change accent color later, edit docs/stylesheets/extra.css
# Full color list: https://squidfunk.github.io/mkdocs-material/setup/changing-the-colors/

markdown_extensions:
  - admonition
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  # - pymdownx.highlight:
  #     anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

nav:
  - Home: index.md
  - Guides:
      - Hibernate Setup — Framework 16 AMD (Fedora): guides/hibernate-fedora-fw16.md
